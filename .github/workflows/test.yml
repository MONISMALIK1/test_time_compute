name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        # Run from the parent of the checkout so test_time_compute/ is importable
        # without an install step — same as local:
        # python -m unittest discover -s test_time_compute/tests -t .
        working-directory: ${{ github.workspace }}/..
        run: python -m unittest discover -s test_time_compute/tests -t . -v
